<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6311102251759070" crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Nova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060607; --s1: #0f0f11; --text: #d0d0d4; --muted: #48484f;
      --dim: #2e2e33; --white: #f0f0f2;
      --glass-bg: rgba(255,255,255,0.04); --glass-b: rgba(255,255,255,0.08);
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: "Lato", sans-serif; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* ambient orbs */
    .amb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(100px); }
    .a1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.035) 0%, transparent 70%); top: -200px; left: -140px; }
    .a2 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(255,255,255,0.022) 0%, transparent 70%); bottom: -120px; right: -80px; }
    /* noise overlay */
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: .35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }
    .card {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 1.1rem;
      background: var(--glass-bg); border: 1px solid var(--glass-b);
      border-radius: 18px; padding: 3rem 3.5rem; text-align: center;
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    }
    .code {
      font-family: "Space Mono", monospace; font-size: 5rem; font-weight: 700;
      letter-spacing: .12em; color: var(--white); line-height: 1;
      background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,.35));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .label {
      font-family: "Space Mono", monospace; font-size: .7rem;
      letter-spacing: .22em; text-transform: uppercase; color: var(--muted);
    }
    .divider { width: 40px; height: 1px; background: var(--glass-b); }
    .msg { font-size: .88rem; color: var(--muted); line-height: 1.65; max-width: 280px; }
    .btn {
      margin-top: .4rem;
      font-family: "Space Mono", monospace; font-size: .62rem;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--text); background: var(--glass-bg); border: 1px solid var(--glass-b);
      border-radius: 8px; padding: .5rem 1.4rem; cursor: pointer;
      text-decoration: none; transition: background .18s, border-color .18s, color .18s;
    }
    .btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: var(--white); }
  </style>
</head>
<body>
  <div class="amb a1"></div>
  <div class="amb a2"></div>
  <div class="card">
    <div class="code">404</div>
    <div class="label">Page not found</div>
    <div class="divider"></div>
    <p class="msg">The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn" href="/">← Go home</a>
  </div>
</body>
</html>
